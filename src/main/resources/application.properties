spring.application.name=Ecommerce

spring.data.mongodb.uri=${MONGO_ATLAS}

spring.security.oauth2.client.registration.google.scope=profile,email

# --- Razorpay Configuration ---
razorpay.key.id=${RAZORPAY_ID}
razorpay.key.secret=${RAZORPAY_SECRET}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=https://ecommerce-backend-cz73.onrender.com/login/oauth2/code/google
server.forward-headers-strategy=framework
# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USER}
spring.mail.password=${EMAIL_APP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

